services:
  setup:
    build:
      context: .
      target: setup
    image: felix-agent:latest
    container_name: felix-setup
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./.env:/app/.env
      - ./workspace:/home/node
    profiles: ["setup"]
    stdin_open: true
    tty: true
    networks:
      - felix-net

  felix:
    build:
      context: .
      target: runtime
    image: felix-agent:latest
    container_name: felix-agent
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "53318:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    secrets:
      - .env
    volumes:
      - ./workspace:/home/node
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    networks:
      - felix-net

secrets:
  .env:
    file: .env

networks:
  felix-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:cafe::/64
