name: Promote release to latest

on:
  workflow_dispatch:
    inputs:
      digest:
        description: Exact digest currently referenced by 0.1.1
        required: true
        type: string

permissions:
  contents: read

env:
  IMAGE: frdinawan/felix-agent

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Promote only the immutable 0.1.1 digest
        env:
          DIGEST: ${{ inputs.digest }}
        run: |
          test "$(docker buildx imagetools inspect "${IMAGE}:0.1.1" | sed -n 's/^Digest: //p' | head -1)" = "$DIGEST"
          docker buildx imagetools create --tag "${IMAGE}:latest" "${IMAGE}@${DIGEST}"
          test "$(docker buildx imagetools inspect "${IMAGE}:latest" | sed -n 's/^Digest: //p' | head -1)" = "$DIGEST"
