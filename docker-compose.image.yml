# Copy this file over docker-compose.yml to use the pre-built Docker Hub image
# instead of building locally.
#
#   cp docker-compose.image.yml docker-compose.yml
#   UID=$(id -u) GID=$(id -g) docker compose up -d

services:
  setup:
    image: ${FELIX_IMAGE:-frdinawan/felix-agent:0.1.1}
    container_name: felix-setup
    user: "${UID:-1000}:${GID:-1000}"
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command: ["node", "scripts/setup.mjs"]
    volumes:
      - ./:/config
      - ./workspace:/home/node
    profiles: ["setup"]
    stdin_open: true
    tty: true
    networks:
      - felix-net

  felix:
    image: ${FELIX_IMAGE:-frdinawan/felix-agent:0.1.1}
    container_name: felix-agent
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "127.0.0.1:53318:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./workspace:/home/node
    secrets:
      - .env
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    networks:
      - felix-net

secrets:
  .env:
    file: .env

networks:
  felix-net:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:cafe::/64
